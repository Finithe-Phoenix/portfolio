name: Publish portfolio

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "portfolio-publish"
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Validate static site
        shell: bash
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js
          grep -qi '<!doctype html>' index.html

      - name: Prepare static publishing files
        shell: bash
        run: |
          touch .nojekyll
          rm -rf .git .github

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          force_orphan: true
          enable_jekyll: false
